<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차란 CX 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 25px;
            animation: slideDown 0.5s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: 800;
        }
        
        .header .subtitle {
            color: #7f8c8d;
            font-size: 15px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .tab {
            padding: 10px 24px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab:hover:not(.active) {
            background: #e0e0e0;
        }

        .week-tabs {
            display: none;
            gap: 10px;
            margin-top: 15px;
        }

        .week-tabs.show {
            display: flex;
        }

        .week-tab {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s;
        }

        .week-tab.active {
            background: #667eea;
            color: white;
        }

        .week-tab:hover:not(.active) {
            background: #f0f0ff;
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .kpi-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: backwards;
        }
        
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .kpi-card:hover::before {
            opacity: 1;
        }
        
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .kpi-card:nth-child(1) { animation-delay: 0.1s; }
        .kpi-card:nth-child(2) { animation-delay: 0.2s; }
        .kpi-card:nth-child(3) { animation-delay: 0.3s; }
        .kpi-card:nth-child(4) { animation-delay: 0.4s; }
        .kpi-card:nth-child(5) { animation-delay: 0.5s; }
        .kpi-card:nth-child(6) { animation-delay: 0.6s; }
        .kpi-card:nth-child(7) { animation-delay: 0.7s; }
        
        .kpi-label {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .kpi-value {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .kpi-unit {
            font-size: 18px;
            color: #95a5a6;
            margin-left: 4px;
        }
        
        .chart-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .chart-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: fadeInUp 0.8s ease-out;
        }
        
        .chart-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        
        canvas {
            max-height: 350px;
        }
        
        .member-list {
            margin-top: 25px;
        }
        
        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        
        .member-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .member-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 15px;
        }
        
        .member-count {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.9;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 차란 CX 실시간 대시보드 <span id="currentDate" style="font-size: 20px; color: #7f8c8d;"></span></h1>
            <div class="subtitle">채널톡 고객응대 현황</div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('daily')">Daily</button>
                <button class="tab" onclick="switchTab('weekly')">Weekly</button>
            </div>
            <div class="week-tabs" id="weekTabs">
                <button class="week-tab" onclick="switchWeek('2026-03-04', '2026-03-10')">3/4 ~ 3/10</button>
                <button class="week-tab active" onclick="switchWeek('2026-03-11', '2026-03-17')">3/11 ~ 3/17</button>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">총 대화</div>
                <div class="kpi-value" id="totalChats">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">케어드 문의</div>
                <div class="kpi-value" id="caredChats">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">마켓 문의</div>
                <div class="kpi-value" id="marketChats">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">진행 중</div>
                <div class="kpi-value" id="openChats">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">완료</div>
                <div class="kpi-value" id="closedChats">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">평균 응답시간</div>
                <div class="kpi-value" id="avgResponse">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">고객 만족도</div>
                <div class="kpi-value" id="csat">-</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-card">
                <div class="chart-title" id="chartTitle">시간대별 대화량</div>
                <canvas id="hourlyChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">팀원별 처리 현황</div>
                <canvas id="memberChart"></canvas>
                <div class="member-list" id="memberList"></div>
            </div>
        </div>

        <div class="last-update" id="lastUpdate"></div>
    </div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div style="text-align: center; color: #667eea; font-weight: 600;">데이터 로딩 중...</div>
    </div>

    <script>
        let currentPeriod = 'daily';
        let currentWeekStart = '2026-03-11';
        let currentWeekEnd = '2026-03-17';
        let hourlyChart, memberChart;

        // 날짜 표시
        function updateDateDisplay() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('currentDate').textContent = `(${year}.${month}.${day})`;
        }

        // 탭 전환
        function switchTab(period) {
            currentPeriod = period;
            
            // 탭 활성화
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Week 탭 표시/숨김
            const weekTabs = document.getElementById('weekTabs');
            if (period === 'weekly') {
                weekTabs.classList.add('show');
                document.getElementById('chartTitle').textContent = '일별 대화량';
            } else {
                weekTabs.classList.remove('show');
                document.getElementById('chartTitle').textContent = '시간대별 대화량';
            }

            // 데이터 갱신
            updateDashboard();
        }

        // 주간 전환
        function switchWeek(startDate, endDate) {
            currentWeekStart = startDate;
            currentWeekEnd = endDate;

            // 주간 탭 활성화
            document.querySelectorAll('.week-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // 데이터 갱신
            updateDashboard();
        }

        async function updateDashboard() {
            // 로딩 표시
            document.getElementById('loading').classList.add('show');
            
            try {
                let url = `/api/stats?period=${currentPeriod}`;
                if (currentPeriod === 'weekly') {
                    url += `&startDate=${currentWeekStart}&endDate=${currentWeekEnd}`;
                }
                const response = await fetch(url, { timeout: 15000 });
                
                if (!response.ok) {
                    throw new Error('API 응답 실패');
                }
                
                const data = await response.json();

                // KPI 업데이트
                document.getElementById('totalChats').textContent = data.total_chats || 0;
                document.getElementById('caredChats').textContent = data.cared_chats || 0;
                document.getElementById('marketChats').textContent = data.market_chats || 0;
                document.getElementById('openChats').textContent = data.open_chats || 0;
                document.getElementById('closedChats').textContent = data.closed_chats || 0;
                document.getElementById('avgResponse').textContent = data.avg_response_time || '-';
                document.getElementById('csat').textContent = data.csat ? `${data.csat}/5.0` : '-';

                // 시간대별/일별 차트 업데이트
                updateHourlyChart(data.hourly_data || data.daily_data);

                // 팀원별 차트 업데이트
                updateMemberChart(data.member_stats);

                // 마지막 업데이트 시간
                document.getElementById('lastUpdate').textContent = 
                    `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

            } catch (error) {
                console.error('데이터 로드 실패:', error);
                alert('데이터를 불러오는 중 오류가 발생했습니다. 페이지를 새로고침해주세요.');
            } finally {
                // 로딩 숨김
                document.getElementById('loading').classList.remove('show');
            }
        }

        function updateHourlyChart(data) {
            const ctx = document.getElementById('hourlyChart');
            
            if (hourlyChart) {
                hourlyChart.destroy();
            }

            const labels = currentPeriod === 'daily' 
                ? Array.from({length: 24}, (_, i) => `${i}시`)
                : data.map(d => d.label);
            
            const values = currentPeriod === 'daily'
                ? Array.from({length: 24}, (_, i) => {
                    const found = data.find(d => d.hour === i);
                    return found ? found.count : 0;
                })
                : data.map(d => d.count);

            hourlyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '대화 수',
                        data: values,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        function updateMemberChart(members) {
            const ctx = document.getElementById('memberChart');
            
            if (memberChart) {
                memberChart.destroy();
            }

            const names = members.map(m => m.name);
            const counts = members.map(m => m.count);

            memberChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: names,
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(237, 100, 166, 0.8)',
                            'rgba(255, 159, 64, 0.8)',
                            'rgba(75, 192, 192, 0.8)'
                        ],
                        borderWidth: 3,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: { size: 13, weight: '600' }
                            }
                        }
                    }
                }
            });

            // 팀원 리스트 업데이트
            const listHtml = members.map(m => `
                <div class="member-item">
                    <span class="member-name">${m.name}</span>
                    <span class="member-count">${m.count}건</span>
                </div>
            `).join('');
            document.getElementById('memberList').innerHTML = listHtml;
        }

        // 초기화
        updateDateDisplay();
        updateDashboard();
        
        // 5분마다 자동 새로고침
        setInterval(updateDashboard, 300000);
    </script>
</body>
</html>
