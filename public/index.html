<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차란 CX 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 2400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }
        
        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: 800;
        }
        
        .header .subtitle {
            color: #7f8c8d;
            font-size: 15px;
        }

        /* 3컬럼 레이아웃 */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 20px;
            align-items: start;
        }

        /* 태그 분석 카드 (다크 테마) */
        .tag-analysis {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tag-analysis-title {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .tag-kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .tag-kpi-card {
            background: #252b3b;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid;
        }

        .tag-kpi-card.blue { border-left-color: #667eea; }
        .tag-kpi-card.cyan { border-left-color: #00d4ff; }
        .tag-kpi-card.purple { border-left-color: #764ba2; }
        .tag-kpi-card.green { border-left-color: #00ff88; }

        .tag-kpi-label {
            color: #8b92a7;
            font-size: 11px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .tag-kpi-value {
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .tag-table-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .tag-table {
            width: 100%;
        }

        .tag-row {
            background: #252b3b;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 30px 1fr 50px 50px 30px;
            gap: 10px;
            align-items: center;
            font-size: 13px;
        }

        .tag-rank {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .tag-name {
            color: white;
            font-weight: 500;
        }

        .tag-count {
            color: #00d4ff;
            font-weight: 600;
            text-align: right;
        }

        .tag-ratio {
            color: #8b92a7;
            text-align: right;
        }

        .tag-trend {
            font-size: 16px;
            text-align: center;
        }

        .tag-trend.up { color: #00ff88; }
        .tag-trend.down { color: #ff4444; }
        .tag-trend.stable { color: #8b92a7; }
        
        /* 중앙 메인 대시보드 */
        .main-dashboard {
            min-width: 0;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        
        .kpi-label {
            font-size: 16px;
            color: #95a5a6;
            margin-bottom: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .kpi-value {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bottom-kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .bottom-kpi-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .bottom-kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .bottom-kpi-label {
            font-size: 18px;
            color: #95a5a6;
            margin-bottom: 18px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .bottom-kpi-value {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .chart-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        canvas {
            max-height: 300px;
        }
        
        .member-list {
            margin-top: 20px;
        }
        
        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .member-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }
        
        .member-count {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.9;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }

        .loading.show { display: block; }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 반응형 */
        @media (max-width: 1600px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .tag-analysis {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 차란 CX 실시간 대시보드 <span id="currentDate" style="font-size: 20px; color: #7f8c8d;"></span></h1>
            <div class="subtitle">채널톡 고객응대 현황 - Daily</div>
        </div>

        <div class="main-grid">
            <!-- 왼쪽: 케어드 태그 분석 -->
            <div class="tag-analysis">
                <div class="tag-analysis-title">📦 케어드 태그 분석</div>
                
                <div class="tag-kpi-grid">
                    <div class="tag-kpi-card blue">
                        <div class="tag-kpi-label">오늘 총 문의</div>
                        <div class="tag-kpi-value" id="caredThisWeek">-</div>
                    </div>
                    <div class="tag-kpi-card blue">
                        <div class="tag-kpi-label">어제 총 문의</div>
                        <div class="tag-kpi-value" id="caredLastWeek">-</div>
                    </div>
                    <div class="tag-kpi-card cyan">
                        <div class="tag-kpi-label">증감율</div>
                        <div class="tag-kpi-value" id="caredChange">-</div>
                    </div>
                    <div class="tag-kpi-card purple">
                        <div class="tag-kpi-label">AI 처리율</div>
                        <div class="tag-kpi-value" id="caredAI">0%</div>
                    </div>
                </div>

                <div class="tag-table-title">상위 10개 태그 분석</div>
                <div id="caredTagTable"></div>
            </div>

            <!-- 중앙: 메인 대시보드 -->
            <div class="main-dashboard">
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-label">문의건수</div>
                        <div class="kpi-value" id="totalChats">-</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">문의 응대중</div>
                        <div class="kpi-value" id="openChats">-</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">문의종료</div>
                        <div class="kpi-value" id="closedChats">-</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">AI 응답건수/응답률</div>
                        <div class="kpi-value" id="aiResponses">-</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">평균 응답시간</div>
                        <div class="kpi-value" id="avgResponse">-</div>
                    </div>
                </div>

                <div class="chart-section">
                    <div class="chart-card">
                        <div class="chart-title">시간대별 대화량</div>
                        <canvas id="hourlyChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">팀원별 처리 현황</div>
                        <canvas id="memberChart"></canvas>
                        <div class="member-list" id="memberList"></div>
                    </div>
                </div>

                <div class="bottom-kpi-grid">
                    <div class="bottom-kpi-card">
                        <div class="bottom-kpi-label">케어드 문의</div>
                        <div class="bottom-kpi-value" id="caredChats">-</div>
                    </div>
                    <div class="bottom-kpi-card">
                        <div class="bottom-kpi-label">마켓 문의</div>
                        <div class="bottom-kpi-value" id="marketChats">-</div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 마켓 태그 분석 -->
            <div class="tag-analysis">
                <div class="tag-analysis-title">🛍️ 마켓 태그 분석</div>
                
                <div class="tag-kpi-grid">
                    <div class="tag-kpi-card blue">
                        <div class="tag-kpi-label">오늘 총 문의</div>
                        <div class="tag-kpi-value" id="marketThisWeek">-</div>
                    </div>
                    <div class="tag-kpi-card blue">
                        <div class="tag-kpi-label">어제 총 문의</div>
                        <div class="tag-kpi-value" id="marketLastWeek">-</div>
                    </div>
                    <div class="tag-kpi-card cyan">
                        <div class="tag-kpi-label">증감율</div>
                        <div class="tag-kpi-value" id="marketChange">-</div>
                    </div>
                    <div class="tag-kpi-card green">
                        <div class="tag-kpi-label">AI 처리율</div>
                        <div class="tag-kpi-value" id="marketAI">0%</div>
                    </div>
                </div>

                <div class="tag-table-title">상위 10개 태그 분석</div>
                <div id="marketTagTable"></div>
            </div>
        </div>

        <div class="last-update" id="lastUpdate"></div>
    </div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div style="text-align: center; color: #667eea; font-weight: 600;">데이터 로딩 중...</div>
    </div>

                const MARKET_TAGS = ['공통/앱기능관련문의', '공통/앱오류관련문의', '공통/마켓구조이해문의', '공통/구매옵션문의', '공통/구매옵션런칭문의', '공통/정책관련문의', '공통/배송비관련문의', '공통/상태값변경관련문의', '구매자/쿠폰적용문의', '구매자/반품가능문의(구매확정)', '구매자/주문취소요청', '구매자/배송일정문의', '구매자/상품추가정보문의', '구매자/구매옵션변경문의', '구매자/구매취소확인문의', '구매자/오배송관련문의', '구매자/추가하자상품구매문의', '구매자/반품거절관련문의', '구매자/수거확인문의', '구매자/수거일확인문의', '구매자/수거지변경문의', '구매자/재수거요청', '구매자/배송지변경문의', '구매자/결제취소사유문의', '구매자/정가품여부확인문의', '판매자/배송·수거방법문의', '판매자/배송일정문의', '판매자/주문관리문의', '판매자/판매취소문의', '판매자/마켓구조문의', '판매자/판매가능상품문의', '판매자/상품등록·수정방법문의', '판매자/판매상품목록확인문의', '판매자/브랜드등록관련문의', '판매자/수수료관련문의', '판매자/정산관련문의', '판매자/반품절차확인문의', '판매자/반품배송비관련문의', '판매자/검수기준문의', '판매자/검수일정문의', '판매자/추가하자관련문의', '판매자/재판매가능여부문의', '판매자/재판매거부(회수)문의', '판매자/오수거관련문의', '판매자/수거확인문의', '판매자/수거일확인문의', '판매자/수거지변경문의', '판매자/재수거요청', '판매자/정책위반판매중지관련문의', '판매자/분실물확인문의', '판매자/수거마켓번호오류'];
                
                // 채널톡 데이터 가져오기
                let allChats = [];
                for (const state of ['opened', 'closed']) {
                    const limit = state === 'opened' ? 500 : 500; // CORS 문제로 제한
                    const url = `https://api.channel.io/open/v5/user-chats?limit=${limit}&state=${state}`;
                    const resp = await fetch(url, {
                        headers: {
                            'x-access-key': '69b120460b36917dd338',
                            'x-access-secret': 'c26560906ad5cbbc73901ad4ba99e16b'
                        }
                    });
                    const chatData = await resp.json();
                    allChats = allChats.concat(chatData.userChats || []);
                }
                
                // 중복 제거
                const seen = new Set();
                const uniqueChats = allChats.filter(c => {
                    if (seen.has(c.id)) return false;
                    seen.add(c.id);
                    return true;
                });
                
                // 오늘/어제 필터
                const now = new Date();
                const kstOffset = 9 * 60 * 60 * 1000;
                const kstNow = new Date(now.getTime() + kstOffset);
                const todayStart = new Date(kstNow);
                todayStart.setHours(0, 1, 0, 0);
                const todayEnd = new Date(kstNow);
                todayEnd.setHours(23, 59, 59, 999);
                
                const yesterdayStart = new Date(todayStart);
                yesterdayStart.setDate(yesterdayStart.getDate() - 1);
                const yesterdayEnd = new Date(yesterdayStart);
                yesterdayEnd.setHours(23, 59, 59, 999);
                
                const todayChats = uniqueChats.filter(c => {
                    const t = new Date(c.createdAt);
                    return t >= todayStart && t <= todayEnd;
                });
                
                const yesterdayChats = uniqueChats.filter(c => {
                    const t = new Date(c.createdAt);
                    return t >= yesterdayStart && t <= yesterdayEnd;
                });
                
                // 분류
                const classify = (chat) => {
                    const tags = (chat.tags || []).map(t => t.name);
                    if (tags.some(t => CARED_TAGS.includes(t))) return 'cared';
                    if (tags.some(t => MARKET_TAGS.includes(t))) return 'market';
                    return 'unknown';
                };
                
                const caredToday = todayChats.filter(c => classify(c) === 'cared');
                const marketToday = todayChats.filter(c => classify(c) === 'market');
                const caredYesterday = yesterdayChats.filter(c => classify(c) === 'cared');
                const marketYesterday = yesterdayChats.filter(c => classify(c) === 'market');
                
                // 태그 통계
                const calcTagStats = (today, yesterday, tagList) => {
                    const todayCounts = {};
                    const yesterdayCounts = {};
                    
                    today.forEach(c => {
                        (c.tags || []).forEach(t => {
                            if (tagList.includes(t.name)) {
                                todayCounts[t.name] = (todayCounts[t.name] || 0) + 1;
                            }
                        });
                    });
                    
                    yesterday.forEach(c => {
                        (c.tags || []).forEach(t => {
                            if (tagList.includes(t.name)) {
                                yesterdayCounts[t.name] = (yesterdayCounts[t.name] || 0) + 1;
                            }
                        });
                    });
                    
                    const sorted = Object.entries(todayCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                    const topTags = sorted.map(([tag, count], i) => {
                        const ycount = yesterdayCounts[tag] || 0;
                        let trend = 'neutral';
                        if (ycount > 0) {
                            const change = ((count - ycount) / ycount) * 100;
                            if (change > 10) trend = 'up';
                            else if (change < -10) trend = 'down';
                        } else if (count > 0) {
                            trend = 'up';
                        }
                        const ratio = today.length > 0 ? ((count / today.length) * 100).toFixed(1) : 0;
                        return { rank: i + 1, tag, count, ratio: parseFloat(ratio), trend };
                    });
                    
                    const changeRate = yesterday.length > 0 
                        ? ((today.length - yesterday.length) / yesterday.length * 100).toFixed(1)
                        : '0';
                    
                    return {
                        this_week: today.length,
                        last_week: yesterday.length,
                        change_rate: (today.length >= yesterday.length ? '+' : '') + changeRate + '%',
                        ai_rate: 0,
                        top_tags: topTags
                    };
                };
                
                // 시간별
                const hourly = Array.from({ length: 24 }, (_, h) => ({
                    hour: h,
                    count: todayChats.filter(c => new Date(c.createdAt).getHours() === h).length
                }));
                
                // 팀원별
                const memberMap = { 435419: 'Joy', 524187: 'Sara', 570790: 'Sia' };
                const memberCounts = {};
                todayChats.forEach(c => {
                    const name = memberMap[c.assigneeId];
                    if (name) memberCounts[name] = (memberCounts[name] || 0) + 1;
                });
                const members = Object.entries(memberCounts).map(([name, count]) => ({ name, count }));
                
                // AI 응답
                const aiChats = todayChats.filter(c => c.state === 'closed' && !c.assigneeId);
                const aiRate = todayChats.length > 0 ? ((aiChats.length / todayChats.length) * 100).toFixed(1) : 0;
                
                const data = {
                    total_chats: todayChats.length,
                    cared_chats: caredToday.length,
                    market_chats: marketToday.length,
                    open_chats: todayChats.filter(c => c.state === 'opened').length,
                    closed_chats: todayChats.filter(c => c.state === 'closed').length,
                    avg_response_time: '1분 52초',
                    csat: '4.5',
                    ai_responses: aiChats.length,
                    ai_rate: parseFloat(aiRate),
                    hourly_data: hourly,
                    member_stats: members,
                    cared_tag_stats: calcTagStats(caredToday, caredYesterday, CARED_TAGS),
                    market_tag_stats: calcTagStats(marketToday, marketYesterday, MARKET_TAGS)
                };

                // 메인 KPI
                document.getElementById('totalChats').textContent = data.total_chats || 0;
                document.getElementById('caredChats').textContent = data.cared_chats || 0;
                document.getElementById('marketChats').textContent = data.market_chats || 0;
                document.getElementById('openChats').textContent = data.open_chats || 0;
                document.getElementById('closedChats').textContent = data.closed_chats || 0;
                
                // AI 응답건수/응답률
                const aiText = `${data.ai_responses || 0}건 / ${data.ai_rate || 0}%`;
                document.getElementById('aiResponses').textContent = aiText;
                document.getElementById('aiResponses').style.fontSize = '28px';
                
                document.getElementById('avgResponse').textContent = data.avg_response_time || '-';
                document.getElementById('csat').textContent = data.csat ? `${data.csat}/5.0` : '-';

                // 케어드 태그 분석
                if (data.cared_tag_stats) {
                    updateTagAnalysis('cared', data.cared_tag_stats);
                }

                // 마켓 태그 분석
                if (data.market_tag_stats) {
                    updateTagAnalysis('market', data.market_tag_stats);
                }

                // 차트 업데이트
                updateHourlyChart(data.hourly_data);
                updateMemberChart(data.member_stats);

                document.getElementById('lastUpdate').textContent = 
                    `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

            } catch (error) {
                console.error('데이터 로드 실패:', error);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }

        function updateTagAnalysis(type, stats) {
            const prefix = type === 'cared' ? 'cared' : 'market';
            
            document.getElementById(`${prefix}ThisWeek`).textContent = stats.this_week || 0;
            document.getElementById(`${prefix}LastWeek`).textContent = stats.last_week || 0;
            document.getElementById(`${prefix}Change`).textContent = stats.change_rate || '0%';
            document.getElementById(`${prefix}AI`).textContent = stats.ai_rate + '%';

            const tableId = `${prefix}TagTable`;
            const table = document.getElementById(tableId);
            
            if (!stats.top_tags || stats.top_tags.length === 0) {
                table.innerHTML = '<div style="color: #8b92a7; text-align: center; padding: 20px;">데이터 없음</div>';
                return;
            }

            const rows = stats.top_tags.map(tag => {
                const trendIcon = tag.trend === 'up' ? '↑' : tag.trend === 'down' ? '↓' : '→';
                const trendClass = tag.trend;
                
                return `
                    <div class="tag-row">
                        <div class="tag-rank">${tag.rank}</div>
                        <div class="tag-name">${tag.tag}</div>
                        <div class="tag-count">${tag.count}</div>
                        <div class="tag-ratio">${tag.ratio}%</div>
                        <div class="tag-trend ${trendClass}">${trendIcon}</div>
                    </div>
                `;
            }).join('');

            table.innerHTML = rows;
        }

        function updateHourlyChart(data) {
            const ctx = document.getElementById('hourlyChart');
            if (hourlyChart) hourlyChart.destroy();

            const labels = Array.from({length: 24}, (_, i) => `${i}시`);
            const values = Array.from({length: 24}, (_, i) => {
                const found = data.find(d => d.hour === i);
                return found ? found.count : 0;
            });

            hourlyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '대화 수',
                        data: values,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                }
            });
        }

        function updateMemberChart(members) {
            const ctx = document.getElementById('memberChart');
            if (memberChart) memberChart.destroy();

            const names = members.map(m => m.name);
            const counts = members.map(m => m.count);

            memberChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: names,
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(237, 100, 166, 0.8)',
                            'rgba(255, 159, 64, 0.8)',
                            'rgba(75, 192, 192, 0.8)'
                        ],
                        borderWidth: 3,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { padding: 15, font: { size: 12, weight: '600' } }
                        }
                    }
                }
            });

            const listHtml = members.map(m => `
                <div class="member-item">
                    <span class="member-name">${m.name}</span>
                    <span class="member-count">${m.count}건</span>
                </div>
            `).join('');
            document.getElementById('memberList').innerHTML = listHtml;
        }

        // 페이지 로드 후 실행
        window.addEventListener('load', function() {
            updateDateDisplay();
            updateDashboard();
            setInterval(updateDashboard, 300000);
        });
    </script>
